##############################################################
# SmartPassport AI – AWS CodeDeploy Application Specification
# This file tells CodeDeploy WHERE and HOW to deploy on EC2
##############################################################
version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/smartpassport-ai

permissions:
  - object: /home/ec2-user/smartpassport-ai
    owner: ec2-user
    group: ec2-user
    mode: "755"
    type:
      - directory
      - file

hooks:
  # Stop the existing app before deploying new code
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: ec2-user

  # Install dependencies after new code is placed
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: ec2-user

  # Start the application
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 30
      runas: ec2-user

  # Health check to verify deployment succeeded
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 30
      runas: ec2-user
